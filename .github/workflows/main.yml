name: ACEest Fitness CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build & Lint
  # ─────────────────────────────────────────
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build on syntax errors or undefined names
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues but do not fail (max line length 120)
          flake8 app.py --count --max-line-length=120 --statistics --exit-zero

      - name: Verify app imports correctly
        run: python -c "from app import app, PROGRAMS; print('App imported successfully')"

  # ─────────────────────────────────────────
  # Job 2: Docker Image Assembly
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aceest-fitness:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as artifact
        run: docker save aceest-fitness:${{ github.sha }} | gzip > aceest-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: aceest-image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 3: Automated Tests inside Docker
  # ─────────────────────────────────────────
  test:
    name: Automated Testing (Pytest in Docker)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < aceest-image.tar.gz

      - name: Run Pytest inside Docker container
        run: |
          docker run --rm \
            --name aceest-test \
            aceest-fitness:${{ github.sha }} \
            python -m pytest tests/ -v --tb=short

      - name: Run Pytest with coverage (direct, for report)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps for coverage report
        run: |
          pip install -r requirements.txt

      - name: Generate coverage report
        run: |
          python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
